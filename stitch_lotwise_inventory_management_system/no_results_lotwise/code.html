<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head><body class="bg-background font-body-md text-on-surface antialiased"><header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl shadow-[0_1px_8px_rgba(0,0,0,0.04)]"><div class="h-16 w-full px-container-margin flex items-center justify-between"><div class="flex items-center gap-stack-md"><img alt="Lotwise Logo" class="h-8 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRj1eCZzTaIZ1nBioBO-yrjeggrEi2tERDv76JMMZeIY_4_1js9Dl75Sh8y_MhGXgrV355W3ZapV9c0c0ac9oJKSaQ56Mfts02i7Q7idDZf7kV7LWYLPaL7PDCG6Bqe23p3L5I4wlavhiQSyY5j03ThtokIC_pAMuYEXsXej_PKDe6Px7Fd1GVXmnTGFK-utcxU0qZU7_wedX7SPEREc794vouoGIux72dvTgCgLjWnet0s5rZUPmPdg"/><span class="font-headline-md text-headline-md text-on-surface tracking-tight">Lotwise</span><div class="ml-stack-md px-2 py-0.5 rounded-full bg-secondary-container text-on-secondary-container font-label-mono text-label-mono uppercase tracking-widest">Admin</div></div><nav class="hidden md:flex items-center gap-stack-lg" data-active-classes="text-primary font-semibold"><a aria-current="page" class="transition-colors text-primary font-semibold" data-path="dashboard" href="#">Inventory</a><a class="text-body-md text-on-surface-variant hover:text-on-surface transition-colors" data-path="analytics" href="#">Analytics</a><a class="text-body-md text-on-surface-variant hover:text-on-surface transition-colors" data-path="settings" href="#">Settings</a><a class="text-body-md text-on-surface-variant hover:text-on-surface transition-colors" data-path="admin-panel" href="#">Admin Panel</a></nav><div class="flex items-center gap-stack-md"><button class="text-body-md text-on-surface-variant hover:text-on-surface transition-colors">Log out</button><div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center"><span class="material-symbols-outlined text-on-primary text-[18px]">person</span></div></div></div></header><main class="w-full pt-16 bg-surface min-h-screen px-container-margin py-stack-lg"><div class="flex flex-col w-full">
<!-- Dynamic Background Element -->
<div class="fixed inset-0 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px] animate-pulse"></div>
<div class="absolute top-[60%] -right-[5%] w-[30%] h-[30%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
<div class="relative min-h-[calc(100vh-160px)] flex flex-col items-center justify-center px-container-margin">
<!-- Visual Centerpiece -->
<div class="relative group">
<!-- Animated Halo -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl scale-150 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- SVG Illustration -->
<svg class="w-full h-full text-on-surface-variant/30 fill-current" viewbox="0 0 200 200">
<!-- Abstract Car Shape -->
<path class="animate-[dash_3s_ease-in-out_infinite]" d="M40 110 L45 95 C48 85 55 80 65 80 L135 80 C145 80 152 85 155 95 L160 110 L170 110 C175 110 180 115 180 120 L180 145 C180 150 175 155 170 155 L165 155 M35 155 L30 155 C25 155 20 150 20 145 L20 120 C20 115 25 110 30 110 L40 110" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
<!-- Wheels -->
<circle cx="55" cy="155" fill="none" r="12" stroke="currentColor" stroke-width="1.5"></circle>
<circle cx="145" cy="155" fill="none" r="12" stroke="currentColor" stroke-width="1.5"></circle>
<!-- Search Glass Overlay -->
<g transform="translate(100, 40) scale(1.2)">
<circle class="opacity-80" cx="20" cy="20" fill="none" r="15" stroke="currentColor" stroke-width="2"></circle>
<line class="opacity-80" stroke="currentColor" stroke-linecap="round" stroke-width="2.5" x1="32" x2="45" y1="32" y2="45"></line>
</g>
</svg>
<!-- Floating Particles -->
<div class="absolute inset-0 animate-[spin_20s_linear_infinite]">
<div class="absolute top-4 left-1/2 w-1 h-1 bg-primary rounded-full"></div>
<div class="absolute bottom-12 right-8 w-1.5 h-1.5 bg-on-surface-variant/40 rounded-full"></div>
<div class="absolute top-1/2 left-4 w-2 h-2 border border-primary/30 rounded-full"></div>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="mt-stack-lg text-center max-w-md z-10">
<div class="flex items-center justify-center gap-unit mb-stack-sm">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<span class="font-label-mono text-label-mono uppercase tracking-[0.2em] text-on-surface-variant">Inventory Report</span>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
<h2 class="font-headline-xl text-headline-xl text-on-surface mb-stack-md leading-tight">
        No vehicles found <br/>
<span class="text-on-surface-variant italic font-light">matching your criteria.</span>
</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant/80 mb-stack-lg leading-relaxed">
        We couldn't find any listings that fit your current filters. Try broadening your search or adjusting your preferences to see more results.
      </p>
<!-- Action Area -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-stack-md">
<button class="group relative px-stack-lg py-4 bg-primary text-on-primary font-headline-md text-headline-md rounded-full overflow-hidden transition-all hover:pr-12 active:scale-95 shadow-xl shadow-primary/10" id="clear-filters">
<span class="relative z-10">Clear all filters</span>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-all">filter_alt_off</span>
</button>
<button class="px-stack-lg py-4 text-on-surface-variant font-headline-md text-headline-md hover:text-on-surface transition-colors">
          View all history
        </button>
</div>
</div>
<!-- Decorative Grid Overlay (Bottom) -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface to-transparent z-0"></div>
</div>
<!-- Keyframe Animations -->
<style>
    @keyframes dash {
      0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
      50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
      100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
    }
  </style>
<script>
    // Micro-interaction for the clear button
    const clearBtn = document.getElementById('clear-filters');
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        // Visual feedback
        clearBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
        setTimeout(() => {
          // Simulate filter clearing
          window.location.reload();
        }, 800);
      });
    }

    // Parallax effect on mouse move for the illustration
    document.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX - window.innerWidth / 2) / 50;
      const moveY = (e.clientY - window.innerHeight / 2) / 50;
      const illustration = document.querySelector('.group');
      if (illustration) {
        illustration.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
      }
    });
  </script>
</div></main></body></html>
