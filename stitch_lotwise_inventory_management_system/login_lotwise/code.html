<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head><body class="bg-background font-body-md text-on-surface antialiased"><main class="min-h-screen flex items-center justify-center bg-surface"><div class="flex flex-col w-full items-center justify-center min-h-[calc(100vh-64px)]">
<!-- Ambient Background Element -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[25%] -left-[10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full animate-pulse"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[40%] h-[40%] bg-primary/5 blur-[100px] rounded-full animate-pulse" style="animation-delay: 2s;"></div>
</div>
<!-- Login Container -->
<div class="relative w-full max-w-[440px] px-gutter">
<!-- Brand Identity Area -->
<div class="flex flex-col items-center mb-stack-lg space-y-unit">
<div class="w-16 h-16 bg-surface-container-highest flex items-center justify-center rounded-xl mb-stack-md shadow-xl">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
          view_in_ar
        </span>
</div>
<h1 class="font-headline-xl text-on-surface tracking-tight">Lotwise</h1>
<p class="font-body-md text-on-surface-variant">Precision inventory management</p>
</div>
<!-- Main Card -->
<div class="bg-surface-container rounded-xl shadow-2xl p-stack-lg border border-outline-variant/10">
<form class="space-y-stack-lg" id="loginForm">
<!-- Input Group: Email -->
<div class="space-y-unit">
<label class="font-label-mono text-on-surface-variant uppercase tracking-widest ml-1" for="email">Work Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">
              mail
            </span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-4 pl-12 pr-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="name@dealership.com" required="" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-unit">
<div class="flex justify-between items-center px-1">
<label class="font-label-mono text-on-surface-variant uppercase tracking-widest" for="password">Security Key</label>
<a class="font-label-mono text-primary hover:underline lowercase" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">
              lock
            </span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-4 pl-12 pr-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="group relative w-full bg-primary text-on-primary font-headline-md py-4 rounded-lg overflow-hidden transition-all hover:scale-[1.01] active:scale-[0.99] shadow-lg shadow-primary/20" type="submit">
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
<span class="relative flex items-center justify-center gap-2">
            Log in
            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</form>
<!-- Secondary Navigation -->
<div class="mt-stack-lg pt-stack-lg border-t border-outline-variant/10 text-center">
<p class="font-body-md text-on-surface-variant">
          Don't have an account? 
          <a class="text-primary font-semibold hover:underline transition-colors" href="#">Register for Lotwise</a>
</p>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-stack-lg flex items-center justify-center gap-4">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-low rounded-full">
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
<span class="font-label-mono text-[10px] text-on-surface-variant uppercase">Systems Nominal</span>
</div>
<div class="font-label-mono text-[10px] text-on-surface-variant uppercase opacity-40">v4.2.0-stable</div>
</div>
</div>
<script>
    // Micro-interaction for the login form
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      const originalContent = btn.innerHTML;
      
      // Loading State Simulation
      btn.disabled = true;
      btn.innerHTML = `
        <span class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Authenticating...
        </span>
      `;

      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = originalContent;
        // Logic for redirect would go here
      }, 1500);
    });

    // Subtle parallax shift on mouse move for the card
    document.addEventListener('mousemove', (e) => {
      const card = document.querySelector('.bg-surface-container');
      const xAxis = (window.innerWidth / 2 - e.pageX) / 80;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 80;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
  </script>
<style>
    /* Prevent layout shift from material symbols loading */
    .material-symbols-outlined {
      font-display: block;
    }
    
    /* Subtle 3D effect for the card container */
    body {
      perspective: 1000px;
    }
    .bg-surface-container {
      transition: transform 0.1s ease-out;
      transform-style: preserve-3d;
    }
  </style>
</div></main></body></html>
